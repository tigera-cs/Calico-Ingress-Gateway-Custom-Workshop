apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: mtls-client-cert-forward
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mtls-gateway
  tls:
    clientValidation:
      caCertificateRefs:
      - kind: ConfigMap
        group: ""
        name: client-ca-cert
  headers:
    xForwardedClientCert:
      mode: SanitizeSet
      certDetailsToAdd:
      - Subject
      - URI
      - DNS
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mtls-route
  namespace: uc3-custom
spec:
  parentRefs:
  - name: mtls-gateway
    namespace: default
  hostnames:
  - "terminate.example.com"
  rules:
  - backendRefs:
    - name: uc3-backend
      port: 3000