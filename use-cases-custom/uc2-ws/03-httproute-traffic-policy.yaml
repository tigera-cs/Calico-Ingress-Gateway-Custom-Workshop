---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: uc2-custom-session-affinity
  namespace: uc2-custom
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: uc2-custom
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Cookie
      cookie:
        name: route
        attributes:
          path: /
          sameSite: Lax
        ttl: 14400s
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sticky-session-route
  namespace: uc2-custom
spec:
  parentRefs:
  - name: sticky-session-gateway
    namespace: default
    sectionName: uc2-http
  hostnames:
  - "app.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: uc2-backend
      port: 3000